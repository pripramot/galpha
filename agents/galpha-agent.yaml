name: galpha-agent
version: 0.1.0
language: th
description: |
  เอเจนต์ช่วยวิเคราะห์ข้อมูล GeoJSON สำหรับงาน OSINT และนิเวศวิทยาไทย
  รองรับ validate, enrich (Mapbox, GBIF), mask (jitter/generalize)
secrets:
  - MAPBOX_TOKEN
  - GBIF_TOKEN
  - SERPAPI_API_KEY
tools:
  - name: process_geojson
    type: python
    entry_point: agents/galpha_agent_tools.py:process_geojson
    description: "orchestrates validate, enrich, mask และส่งคืน summary, geojson, anomalies, map_actions"
output_schema:
  type: object
  properties:
    summary:
      type: string
    geojson:
      type: object
    anomalies:
      type: array
      items:
        type: object
    map_actions:
      type: array
      items:
        type: object
  required:
    - summary
    - geojson
